<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>若兰</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 顶部栏 -->
<div id="topbar">
  <div class="avatar"></div>
  <div class="title">若兰</div>
</div>

<!-- 工具栏 -->
<div id="tools">
  <input id="searchBox" placeholder="搜索聊天" oninput="searchChat(this.value)">
  <input type="date" onchange="loadByDate(this.value)">
</div>

<!-- 聊天 -->
<div id="chat"></div>

<!-- 输入 -->
<div id="input">
  <input id="msg" placeholder="说点什么...">
  <button onclick="send()">发送</button>
</div>

<script src="add.js"></script>
</body>
</html>
